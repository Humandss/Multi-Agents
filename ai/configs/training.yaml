base_model: LGAI-EXAONE/EXAONE-3.5-7.8B-Instruct
base_model_revision: 496aef060b296b34c6b0035149f5af9e2b8c168c

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: bfloat16
  bnb_4bit_use_double_quant: true

lora:
  r: 32
  alpha: 64
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  task_type: CAUSAL_LM

train:
  num_epochs: 5
  per_device_batch_size: 1
  gradient_accumulation_steps: 8
  gradient_checkpointing: true
  learning_rate: 2.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.1
  weight_decay: 0.01
  max_seq_length: 768
  optim: paged_adamw_8bit
  bf16: true
  logging_steps: 10
  save_strategy: epoch
  save_total_limit: 2
  seed: 42
