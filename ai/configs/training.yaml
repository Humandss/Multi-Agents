base_model: LGAI-EXAONE/EXAONE-3.5-2.4B-Instruct
base_model_revision: 8e6fc27d1910b526b5d48a2aa129b08a0293df5e

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: bfloat16
  bnb_4bit_use_double_quant: true

lora:
  r: 32
  alpha: 64
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  task_type: CAUSAL_LM

train:
  num_epochs: 5
  per_device_batch_size: 2
  gradient_accumulation_steps: 4
  gradient_checkpointing: true
  learning_rate: 2.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.1
  weight_decay: 0.01
  max_seq_length: 1024
  optim: paged_adamw_8bit
  bf16: true
  logging_steps: 10
  save_strategy: epoch
  save_total_limit: 2
  seed: 42
