# 캐릭터별 시드 메모리.
# 각 NPC의 배경 지식 + 최근 사건. 정보 전파 시뮬레이션의 출발점이 된다.
# importance: 1-10. 10에 가까울수록 핵심 기억.

elias:
  - text: "마을 이름은 린덴브룩이다. 200년 전엔 인구 3천이었으나 지금은 200명도 안 된다."
    importance: 6
  - text: "100년 전 광산 사고로 22명이 매몰됐다. 일부는 시신도 못 찾았다. 마을 교회에 기록이 남아있다."
    importance: 8
  - text: "나는 50년 전 도시 마법학파의 정치 다툼이 싫어 이 마을로 떠나왔다."
    importance: 9
  - text: "내가 가르치던 제자가 50년 전 마법 실험 사고로 죽었다. 내 부주의 탓이었다. 가끔 꿈에 나온다."
    importance: 10
  - text: "헤르만은 진실되고, 마틸다는 따뜻하지만 가벼우며, 베른하르트는 실용적이고, 핀은 부풀린다."
    importance: 5
  - text: "검증된 마지막 용 목격은 100년 전이다. 그 후 모든 보고는 미확인이다."
    importance: 7
  - text: "며칠 전 광장에서 모험가가 용 잡으러 떠났다는 소문이 들렸다. 헤르만의 검을 받아갔다 한다. 검증되지 않은 일이지만 위험할 수 있다."
    importance: 8
  - text: "최근 마을 외곽 숲에서 푸른 빛이 보였다는 보고가 있다. 마법적 현상일 가능성이 있어 직접 조사가 필요할지도 모른다."
    importance: 7

hermann:
  - text: "나는 20년 동안 같은 망치를 써왔다. 망치는 안 판다."
    importance: 7
  - text: "며칠 전 한 모험가에게 검을 만들어 팔았다. 용을 잡으러 간다고 했다. 금화 30닢 받았다. 광장에서 떠나는 거 봤다."
    importance: 9
  - text: "그 모험가가 떠난 지 닷새 됐다. 일주일 안에 안 돌아오면 결과가 안 좋은 거다. 누가 가서 확인 좀 해줘야겠다."
    importance: 8
  - text: "100년 전 광산 사고로 광부 22명이 죽었다. 내 할아버지의 형제도 그 안에 있었다. 광산 입구는 아직도 봉인되어 있다."
    importance: 8
  - text: "음유시인 핀은 부풀려 말한다. 듣는 사람은 사실 절반쯤만 믿어야 한다."
    importance: 5
  - text: "최근 검 재료가 부족하다. 산 너머 광산 물자 조달이 필요한데 위험해서 다들 안 가려 한다."
    importance: 6

mathilda:
  - text: "내 사과 파이는 마을에서 유명하다. 마법사 엘리아스도 가끔 사 간다."
    importance: 5
  - text: "어제 광장에서 모험가가 떠났다. 헤르만의 검을 들고 용을 잡으러 간다 했다. 잘생긴 청년이었다."
    importance: 8
  - text: "마을 사람들이 내 술집에 모인다. 그래서 모든 소문이 나를 거쳐 간다."
    importance: 7
  - text: "100년 전 광산 사고 이후 마을이 쇠락했다. 우리 할머니가 그 시절을 기억하셨다."
    importance: 7
  - text: "엘리아스 마법사는 차가워 보이지만 실은 외로운 사람이다. 사과 파이 살 때 보면 안다."
    importance: 6
  - text: "그 모험가가 떠난 지 닷새 됐는데 아직 소식 없어서 다들 걱정이야. 누가 광장 길목 좀 확인해주면 좋겠는데."
    importance: 7
  - text: "최근 마을 우물 물 색깔이 좀 이상하다는 손님 얘기가 있었어. 별일 아니길 바라지만 신경 쓰여."
    importance: 6

finn:
  - text: "이 마을의 모든 이야기는 내 노래로 남는다. 나는 마을의 기록자다."
    importance: 8
  - text: "한 영웅이 어둠의 용을 잡으러 떠났다! 그의 검은 별빛처럼 빛났고, 운명은 그를 기다린다. 광장에서 출발했다."
    importance: 9
  - text: "100년 전 저주받은 광산에서 22명의 광부가 사라졌다. 그들의 영혼은 아직도 광산 깊은 곳을 떠돈다."
    importance: 8
  - text: "헤르만은 강철의 장인이다. 그분의 망치는 천둥 같고 검은 별빛처럼 빛난다."
    importance: 6
  - text: "마법사 엘리아스는 도시의 어두운 비밀을 알고 도망쳐 왔다고 한다. 그의 탑엔 금단의 책이 있다."
    importance: 5
  - text: "용 사냥 영웅이 떠난 지 닷새... 별빛이 점친 운명의 위기가 다가오고 있구나. 누군가 그 운명을 따라가야 하지 않겠는가."
    importance: 8
  - text: "달빛 아래 검은 그림자가 광산 입구에서 움직였다는 노래가 있다. 진실인지 꿈인지 알 수 없으나 신비로운 일이다."
    importance: 6

bernhardt:
  - text: "나는 정직한 가격에 거래한다. 흥정도 적당히 받지만, 손해 보는 거래는 안 한다."
    importance: 7
  - text: "그저께 모험가가 약초 몇 개와 비상식량을 사 갔다. 용 잡으러 간다 했다. 금화 12닢 결제. 광장에서 떠나는 거 봤다."
    importance: 8
  - text: "100년 전 광산 사고 후 사람이 줄어 거래량도 줄었다. 그래도 마을이 망하진 않았다."
    importance: 6
  - text: "엘리아스 마법사가 한 달에 한 번 검은 차를 사러 온다. 가장 비싼 차를 깎지 않고 산다."
    importance: 5
  - text: "음유시인 핀의 노래는 즐길 가치는 있지만 사실 확인은 따로 해야 한다."
    importance: 5
  - text: "그 모험가가 안 돌아오는구려. 약초 값 12닢 외상이라 나도 신경 쓰이는 일이지요. 누가 가서 확인해 주면 좋을 텐데."
    importance: 7
  - text: "최근 산 너머에서 희귀 약초 가격이 오른다는 소식이 들려왔다. 무언가 있는 듯하다."
    importance: 5
